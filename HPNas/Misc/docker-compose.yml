---
name: misc

services:
  heimdall:
    image: linuxserver/heimdall
    container_name: heimdall
    volumes:
      - /home/pi/config/heimdall/config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - '443:443'
      - '8080:80'
    restart: unless-stopped
