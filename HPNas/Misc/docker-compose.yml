---
name: misc

services:
  heimdall:
    image: linuxserver/heimdall:2.7.6
    container_name: heimdall
    volumes:
      - /home/pi/config/heimdall/config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    ports:
      - '0.0.0.0:443:443'
      - '0.0.0.0:8080:80'
    restart: unless-stopped
