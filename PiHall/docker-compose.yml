---
name: pihall
# Main docker-compose file for PiHall

include:
  - ../utils/docker-compose.yml

services:
  pihole:
    image: pihole/pihole:2026.02.0
    container_name: pihole
    # Volumes store your data between container upgrades
    volumes:
      - type: bind
        source: /home/pi/docker-mounts/pihole/etc
        target: /etc/pihole
      - type: bind
        source: /home/pi/docker-mounts/pihole/dnsmasq.d
        target: /etc/dnsmasq.d
    environment:
      TZ: "Europe/London"
    # For DHCP it is recommended to remove these ports and instead add: network_mode: "host"
    ports:
      - '0.0.0.0:53:53/tcp'
      - '0.0.0.0:53:53/udp'
      # - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
      - '0.0.0.0:80:80/tcp'
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    # cap_add:
    # - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed
    restart: unless-stopped
  tailscale:
    image: tailscale/tailscale:v1.94.2
    container_name: Tail-Scale
    volumes:
      - ${PWD}/tailscale/state:/var/lib/tailscale
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_EXTRA_ARGS=${TAILSCALE_EXTRA_ARGS}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    network_mode: "host"
    restart: unless-stopped
    cap_add:
      - net_admin
      - sys_module
    devices:
      - /dev/net/tun:/dev/net/tun
    hostname: tailscale
