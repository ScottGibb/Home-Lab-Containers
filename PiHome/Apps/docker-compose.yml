---
name: apps

services:
  scratchmap:
    image: ad3m3r5/scratch-map:latest
    container_name: scratchmap
    volumes:
      - type: bind
        source: /home/pi/docker-mounts/scratchmap
        target: /data
    environment:
      DBLOCATION: "/data"
    ports:
      - '3000:3000'
    restart: unless-stopped
