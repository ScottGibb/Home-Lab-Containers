---
# Main docker-compose file for PrusaPrint
# This file includes all services for the PrusaPrint system using Docker Compose's include feature
#
# Project Name: prusaprint
# All included services (utils, networking) are part of this unified project.
# Previously, each subdirectory had its own project name (utils, networking),
# but with the include directive, all services are consolidated under one project name.

name: prusaprint

include:
  - ../utils/docker-compose.yml
  - ./Networking/docker-compose.yml
