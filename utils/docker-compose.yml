---
name: utils

services:

  Agent:
    image: portainer/agent:2.38.0
    container_name: portainer_agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - '0.0.0.0:9001:9001'
    restart: unless-stopped

  nginx:
    image: nginx:1.29-alpine
    container_name: nginx
    volumes:
      - type: bind
        source: /home/pi/config/nginx/etc/nginx/templates
        target: /etc/nginx/templates
      - type: bind
        source: ${NGINX_CONF_PATH}
        target: /etc/nginx/nginx.conf
    environment:
      - NGINX_HOST=${NGINX_HOST}
      - NGINX_PORT=${NGINX_PORT}
    ports:
      - '0.0.0.0:80:80'
    restart: unless-stopped
  Portainer:
    image: portainer/portainer-ce:2.38.0
    container_name: portainer
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /home/pi/config/portainer/data
        target: /data
    ports:
      - '0.0.0.0:8000:8000'
      - '0.0.0.0:9000:9000'
      - '0.0.0.0:9443:9443'
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:2.1.0
    container_name: uptime-kuma
    volumes:
      - type: bind
        source: /home/pi/config/uptime-kuma
        target: /app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - '0.0.0.0:3001:3001'
    restart: unless-stopped
